# ===========================================================================
#  Настройки бекенда MySQL.
#
#  MySQL поддерживает мультисерверные развёртывания (несколько экземпляров
#  Grim пишут в одну центральную БД). Требует драйвер MySQL Connector/J в
#  рантайме; если драйвер отсутствует, бекенд сам отключается на старте,
#  пишет понятную ошибку, а маршрут, ссылавшийся сюда, переключается на
#  то, что настроено в качестве запасного.
# ===========================================================================

# Все ключи лежат под `mysql:`, чтобы пространство имён этого файла не
# конфликтовало с соседними файлами других бекендов (sqlite:, postgres:,
# mongo:, redis:), когда Configuralize объединяет их в общий namespace.
mysql:
  # Цель подключения.
  host: "localhost"
  port: 3306
  database: "grim"
  user: "root"
  password: ""

  # Дополнительные URL-параметры, дописываемые после фиксированного набора
  # (useSSL=false&allowPublicKeyRetrieval=true&rewriteBatchedStatements=true).
  # Оставьте пустым, если нет специфической необходимости — значения по
  # умолчанию подходят для локальной dev-установки.
  extra-jdbc-params: ""

  # Потолок batch-flush на хендлер. Каждый ring-хендлер копит события в
  # batch PreparedStatement и коммитит на endOfBatch ИЛИ при достижении
  # этого потолка — что наступит раньше. Большие значения меняют задержку
  # на пропускную способность при устойчивых всплесках.
  batch-flush-cap: 256

  # Переопределения имён таблиц. Переименовав любой из шести логических
  # хранилищ, можно делить одну MySQL-БД между несколькими экземплярами
  # Grim или подстроиться под корпоративную схему именования. Значения по
  # умолчанию ниже.
  tables:
    meta: grim_meta
    checks: grim_checks
    players: grim_players
    sessions: grim_sessions
    violations: grim_violations
    settings: grim_settings

# Маркеры схемы — см. шапку config.yml.
config-flavor: V2
config-version: 1
