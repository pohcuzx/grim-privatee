# \u00BB は » (二重 >>)です。ANSI と UTF-8 はこれを異なる方法で解釈します... 場合によっては ? と表示されることがあります。
prefix: "&bGrim &8\u00BB"

alerts-enabled: "%prefix% &fアラートが有効になりました"
alerts-disabled: "%prefix% &fアラートが無効になりました"
verbose-enabled: "%prefix% &fVerbose enabled"
verbose-disabled: "%prefix% &fVerbose disabled"
brands-enabled: "%prefix% &fBrands enabled"
brands-disabled: "%prefix% &fBrands disabled"
client-brand-format: "%prefix% &f%player% が %brand% を使用して参加しました"
console-specify-target: "%prefix% &cコンソールでターゲットを指定する必要があります！"
player-not-found: "%prefix% &cプレイヤーはチェックから免除されているか、オフラインです！"
player-not-this-server: "%prefix% &cプレイヤーはこのサーバーにいません！"
sender-not-found: "%prefix% &c免除状態の場合、このコマンドは使用できません！"
spectate-return: "\n%prefix% &f以前の場所に戻るにはここをクリック\n"
cannot-spectate-return: "%prefix% &c観戦しているプレイヤー以外ではこの操作はできません"
cannot-run-on-self: "%prefix% &c自分に対してこのコマンドは使用できません！"
upload-log: "%prefix% &fデバッグをアップロードしました: %url%"
upload-log-start: "%prefix% &fログをアップロード中... しばらくお待ちください"
upload-log-not-found: "%prefix% &cそのログが見つかりません"
upload-log-upload-failure: "%prefix% &cログのアップロード中に問題が発生しました。詳細はコンソールを確認してください"
disconnect:
    timeout: "<lang:disconnect.timeout>"
    closed: "<lang:disconnect.closed>"
    error: "<red>An error occurred whilst processing packets. Please contact the administrators."
    blacklisted-forge: "<red>Your forge version is blacklisted due to inbuilt reach hacks.<newline><gold>Versions affected: 1.18.2-1.19.3<newline><newline><red>Please see https://github.com/MinecraftForge/MinecraftForge/issues/9309."
run-as-player: "%prefix% &cこのコマンドはプレイヤーのみが使用できます！"
run-as-player-or-console: "%prefix% &cこのコマンドはプレイヤーまたはコンソールからのみ使用できます！"
webhook-not-enabled: "Discord webhooks are not enabled!"
webhook-test-message: "test message"
webhook-test-succeeded: "Discord webhook test succeeded!"
webhook-test-failed: "Discord webhook test failed!"

# 使用可能なプレースホルダー:
# %prefix%
# %player%
# %check_name%
# %description%
# %experimental%
# %vl% - 違反回数
# %verbose% - チェックからの追加情報（全てのチェックが情報を追加するわけではありません）
alerts-format: "%prefix% &f%player% が &b%check_name%%experimental% &fに失敗しました (x&c%vl%&f) &7%verbose%"
alerts-format-proxy: "%prefix% &f[&cプロキシ&f] &f%player% が &b%check_name%%experimental% &fに失敗しました (x&c%vl%&f) &7%verbose%"
experimental-symbol: "*"

profile:
    - "&7======================"
    - "%prefix% &b%player% のプロファイル"
    - "&bPing: &f%ping%"
    - "&bバージョン: &f%version%"
    - "&bクライアントブランド: &f%brand%"
    - "&b水平感度: &f%h_sensitivity%%"
    - "&b垂直感度: &f%v_sensitivity%%"
    - "&bFastMath 有効: &f%fast_math%"
    - "&7======================"
help:
    - "&7======================"
    - "/grim alerts &f- &7アラートを切り替えます"
    - "/grim brands &f- &7Toggle brands"
    - "/grim profile <player> &f- &7プレイヤー情報を表示します"
    - "/grim help &f- &7このヘルプメッセージを表示します"
    - "/grim debug <player> &f- &7開発者用の予測出力を表示します"
    - "/grim perf &f- &7開発者用のパフォーマンス (ms/予測)"
    - "/grim reload &f- &7設定をリロードします"
    - "/grim spectate <player> &f- &7プレイヤーを観戦します"
    - "/grim verbose &f- &7全てのフラグをバッファなしで表示します"
    - "/grim log [0-255] &f- &7予測フラグのデバッグログをアップロードします"
    - "/grim history <player> &f- &7セッション一覧（新しい順）"
    - "/grim history <player> page <N> &f- &7セッション一覧の N ページ目へ移動"
    - "/grim history <player> session <N|latest> [-d] [-v] &f- &7セッション詳細（新しい違反順）"
    - "/grim history <player> session <N|latest> page <N> [-d] [-v] &f- &7セッション詳細の違反 N ページ目"
    - "&7======================"

# === /grim history ===
# セッション単位の履歴 UI です。下記すべての行は自由に書き換え可能で、
# プレースホルダはキーごとにコメントで説明しています。セッション行と違反行の
# ホバー文は、生データ（verbose、チェック内訳）からレンダラーが自動生成するため
# テンプレートは不要です。任意の行に <hover:show_text:'...'> を追加すると
# ツールチップを重ねて表示できます。

grim-history-load-failure: "%prefix% &c履歴サブシステムの読み込みに失敗しました！サーバーコンソールでエラーを確認してください。"
grim-history-disabled: "%prefix% &c履歴サブシステムは無効です！"
grim-history-failed: "%prefix% &c履歴の読み込みに失敗しました：&7%error%"
grim-history-unknown-player: "%prefix% &c不明なプレイヤー：&f%player%"
grim-history-no-sessions: "%prefix% &7&f%player% &7のセッション履歴はありません。"
grim-history-session-not-found: "%prefix% &c&f%player% &cの第 &f%ordinal% &c回セッションが見つかりません。"

# セッション一覧 — 有効なプレースホルダ: %prefix% %player% %page% %max_pages%
grim-history-header: "%prefix% &b&f%player% &bのセッション履歴 &8[&f%page%&7/&f%max_pages%&8]"
# セッション概要行 — 有効なプレースホルダ:
#   %prefix% %player% %ordinal% %grim_version% %server_name%
#   %client_version% %client_brand% %duration% %timeago%
#   %violations% %unique_checks% %crashed_marker%
# サーバークラッシュ・kill -9・UserDisconnectEvent を発火しないチャネル RST など、
# 接続が正常終了せずに失われたセッションでは %crashed_marker% が
# grim-history-crashed-marker に展開されます。継続中／正常終了したセッションでは
# 空文字列になります。
grim-history-session: "%prefix% &8[&b%grim_version%&8] &8[&b%server_name%&8] &8[&b%client_version%&8] &b第 &f%ordinal% &b回セッション、時間 &f%duration%&b、違反 &c%violations%&b 件 &8[&c%unique_checks%&8]%crashed_marker% &8(&7%timeago% 前&8)"

# closed_at == last_activity のセッション（つまり次回起動時のクラッシュ掃引で
# スタンプされ、切断パスを通っていない行）に対して %crashed_marker% に
# 差し込まれるインラインマーカーです。先頭にスペースを含めることで、
# 表示時は自然に読め、空のときはきれいに消えます。
grim-history-crashed-marker: " &8(&cクラッシュ&8)"

# セッション詳細 — 有効なプレースホルダ:
#   %prefix% %player% %ordinal% %grim_version% %server_name%
#   %client_version% %client_brand% %duration% %timeago%
#   %violations% %unique_checks% %bucket_size%
grim-history-detail-header: "%prefix% &b&f%player% &bの第 &f%ordinal% &b回セッションの詳細："
grim-history-detail-meta1: "%prefix% &bGrim: &f%grim_version%&b, サーバー: &f%server_name%&b, 時間: &f%duration%&b, 日時: &7%timeago% 前"
grim-history-detail-meta2: "%prefix% &bクライアント: &f%client_version%&b, ブランド: &f%client_brand%"
grim-history-detail-violations-header: "%prefix% &b違反: &8(合計 %violations% 件、ユニーク %unique_checks% 件)"
grim-history-detail-empty: "%prefix% &7- (なし)"
# グループ化された行（デフォルト） — 有効なプレースホルダ: %prefix% %offset% %checks_list%
#   %checks_list% は grim-history-check-count の項目を ", " で連結したものです
grim-history-detail-group: "%prefix% &7- %checks_list% &8(&b%offset%&8)"
# 単一の生違反行（--detailed） — 有効なプレースホルダ:
#   %prefix% %offset% %check% %vl% %verbose%
grim-history-detail-entry: "%prefix% &7- &f%check% &8(&b%offset%&8)&7 %verbose%"
# %checks_list% の各チェック項目の内部書式 — 有効なプレースホルダ: %check_name% %count%
grim-history-check-count: "&f%check_name%&7 x&c%count%"

# スキーマ用マーカー — config.yml のヘッダーコメントを参照。
config-flavor: V2
config-version: 1
